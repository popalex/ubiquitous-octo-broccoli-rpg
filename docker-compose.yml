services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: small-rpg-postgres
    environment:
      POSTGRES_DB: roleplay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roleplay"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: small-rpg-ollama
    command: ["serve"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    container_name: small-rpg-ollama-init
    entrypoint: ["/bin/sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      DEV_MODE: ${DEV_MODE:-false}
      DEV_MODEL_NAME: ${DEV_MODEL_NAME:-llama3.2:3b}
      ACTOR_MODEL_NAME: ${ACTOR_MODEL_NAME:-llama3.1:8b}
      MEMORY_MODEL_NAME: ${MEMORY_MODEL_NAME:-phi3:mini}
      GM_MODEL_NAME: ${GM_MODEL_NAME:-llama3.1:8b}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-nomic-embed-text}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"
    command:
      - -c
      - |
        set -e
        until ollama list >/dev/null 2>&1; do sleep 2; done
        # In dev mode, only pull the single dev model
        if [ "$$DEV_MODE" = "true" ]; then
          echo "DEV MODE: pulling single model $$DEV_MODEL_NAME"
          ollama pull $$DEV_MODEL_NAME
          echo "Pulling embedding model $$EMBEDDING_MODEL_NAME"
          ollama pull $$EMBEDDING_MODEL_NAME
          exit 0
        fi
        # Production: pull all unique models
        echo "Pulling actor model $$ACTOR_MODEL_NAME"
        ollama pull $$ACTOR_MODEL_NAME
        if [ "$$MEMORY_MODEL_NAME" != "$$ACTOR_MODEL_NAME" ]; then
          echo "Pulling memory model $$MEMORY_MODEL_NAME"
          ollama pull $$MEMORY_MODEL_NAME
        fi
        if [ "$$GM_MODEL_NAME" != "$$ACTOR_MODEL_NAME" ] && [ "$$GM_MODEL_NAME" != "$$MEMORY_MODEL_NAME" ]; then
          echo "Pulling GM model $$GM_MODEL_NAME"
          ollama pull $$GM_MODEL_NAME
        fi
        if [ "$$EMBEDDING_MODEL_NAME" != "$$ACTOR_MODEL_NAME" ] && [ "$$EMBEDDING_MODEL_NAME" != "$$MEMORY_MODEL_NAME" ] && [ "$$EMBEDDING_MODEL_NAME" != "$$GM_MODEL_NAME" ]; then
          echo "Pulling embedding model $$EMBEDDING_MODEL_NAME"
          ollama pull $$EMBEDDING_MODEL_NAME
        fi
        echo "All models pulled successfully"

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: small-rpg-api
    environment:
      APP_NAME: ${APP_NAME:-small-rpg-gpt}
      APP_ENV: ${APP_ENV:-development}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/roleplay}
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-rpg-backend}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-0.1.0}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=small-rpg-gpt,deployment.environment=local}
      # true = full telemetry (capture LLM prompts/completions + user messages on spans)
      # false = metadata only (model, tokens, latency — no prompt/response text)
      OTEL_CAPTURE_CONTENT: ${OTEL_CAPTURE_CONTENT:-true}
      # Dev mode: use single model to save RAM
      DEV_MODE: ${DEV_MODE:-false}
      DEV_MODEL_NAME: ${DEV_MODEL_NAME:-llama3.2:3b}
      # Providers
      ACTOR_PROVIDER: ${ACTOR_PROVIDER:-ollama}
      MEMORY_PROVIDER: ${MEMORY_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      GM_PROVIDER: ${GM_PROVIDER:-ollama}
      # Models
      ACTOR_MODEL_NAME: ${ACTOR_MODEL_NAME:-llama3.1:8b}
      MEMORY_MODEL_NAME: ${MEMORY_MODEL_NAME:-phi3:mini}
      GM_MODEL_NAME: ${GM_MODEL_NAME:-llama3.1:8b}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      # External providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Retrieval settings
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      RETRIEVAL_CANDIDATE_POOL: ${RETRIEVAL_CANDIDATE_POOL:-20}
      RECENCY_HALF_LIFE_HOURS: ${RECENCY_HALF_LIFE_HOURS:-72}
      MEMORY_SUMMARY_INTERVAL: ${MEMORY_SUMMARY_INTERVAL:-6}
      # Token budgets
      ACTOR_MAX_INPUT_TOKENS: ${ACTOR_MAX_INPUT_TOKENS:-6000}
      ACTOR_RESERVED_OUTPUT_TOKENS: ${ACTOR_RESERVED_OUTPUT_TOKENS:-500}
      # Temperature settings
      ACTOR_TEMPERATURE: ${ACTOR_TEMPERATURE:-0.7}
      CONTINUITY_TEMPERATURE: ${CONTINUITY_TEMPERATURE:-0.2}
      GM_TEMPERATURE: ${GM_TEMPERATURE:-0.8}
      GM_MAX_OUTPUT_TOKENS: ${GM_MAX_OUTPUT_TOKENS:-800}
      GM_NARRATION_MAX_TOKENS: ${GM_NARRATION_MAX_TOKENS:-150}
      # GM event settings
      EVENT_CHECK_INTERVAL: ${EVENT_CHECK_INTERVAL:-3}
      EVENT_PROBABILITY: ${EVENT_PROBABILITY:-0.4}
      # Quest system (AI-tracked narrative arcs)
      QUESTS_ENABLED: ${QUESTS_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
    container_name: small-rpg-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

  # Grafana LGTM all-in-one: Grafana UI + Tempo (traces) + Loki (logs) + Prometheus (metrics).
  # One pane of glass for the whole frontend -> backend -> LLM trace.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: small-rpg-otel
    environment:
      # Surface the bundled components' logs in `docker logs small-rpg-otel`
      # (off by default in the image). Useful for debugging log ingestion.
      ENABLE_LOGS_LOKI: ${ENABLE_LOGS_LOKI:-true}
      ENABLE_LOGS_OTELCOL: ${ENABLE_LOGS_OTELCOL:-true}
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC (backend)
      - "4318:4318"   # OTLP HTTP (browser, proxied via frontend /otel)
    volumes:
      - otel_lgtm_data:/data
      # Auto-provision the RPG dashboards (metrics, logs, traces) on startup.
      # Datasources (Tempo/Loki/Prometheus) are already provisioned by the image.
      - ./observability/grafana/provisioning/dashboards/rpg.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/rpg.yaml:ro
      - ./observability/grafana/dashboards:/otel-lgtm/grafana/dashboards/rpg:ro

volumes:
  postgres_data:
  ollama_data:
  otel_lgtm_data:
