# docker-compose.override.yml
# Automatically loaded by `docker compose up` alongside docker-compose.yml.
# Switches the frontend to the Vite dev server with hot-reload and source mounts.
#
# To switch to prod: comment out the "dev" block and uncomment the "prod" block.

services:
  api:
    # ── dev: default every toggle on (all ship dark in prod). These are the
    # values the UI seeds new-chronicle toggles from, via /health. ──────────
    environment:
      # Dev: single small model to save RAM (base compose defaults DEV_MODE off).
      DEV_MODE: ${DEV_MODE:-true}
      # Dev model: qwen2.5:3b is steadier on the JSON judge (assess_action /
      # post-turn judge) than llama3.2:3b. Old model kept as a backup below —
      # swap the two comments to revert.
      # DEV_MODEL_NAME: ${DEV_MODEL_NAME:-llama3.2:3b}   # backup
      DEV_MODEL_NAME: ${DEV_MODEL_NAME:-qwen2.5:3b}
      GM_ENABLED: ${GM_ENABLED:-true}
      WORLD_STATE_ENABLED: ${WORLD_STATE_ENABLED:-true}
      QUESTS_ENABLED: ${QUESTS_ENABLED:-true}
      SUGGESTIONS_ENABLED: ${SUGGESTIONS_ENABLED:-true}
      DICE_ENABLED: ${DICE_ENABLED:-true}
      CHARACTER_SHEET_ENABLED: ${CHARACTER_SHEET_ENABLED:-true}

  # ollama-init lives in the base compose; override its dev model here so the
  # model it pulls matches the api's DEV_MODEL_NAME above (keep them in lock-step).
  ollama-init:
    environment:
      DEV_MODE: ${DEV_MODE:-true}
      # DEV_MODEL_NAME: ${DEV_MODEL_NAME:-llama3.2:3b}   # backup
      DEV_MODEL_NAME: ${DEV_MODEL_NAME:-qwen2.5:3b}

  frontend:
    # ── dev (Vite HMR) ──────────────────────────────────────
    build:
      target: dev
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      # Vite proxies the browser's /otel telemetry to the collector (container DNS name).
      VITE_OTEL_PROXY_TARGET: http://otel-lgtm:4318
      # node_modules is an anonymous volume that persists across runs; when deps
      # change (lockfile updated via the host mount) pnpm's pre-run deps check
      # must purge & reinstall it. With no TTY it aborts (ERR_PNPM_ABORTED_REMOVE_
      # MODULES_DIR_NO_TTY) — .npmrc's confirm-modules-purge isn't honored on that
      # path in pnpm 11, so CI=true (read early & unconditionally) lets it proceed.
      CI: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: !override
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]

    # ── prod (nginx) ────────────────────────────────────────
