[tool.ruff]
# Pinned to the lowest interpreter the tree must run on (local dev venvs are
# 3.12; CI/Docker run 3.14). With py314, ruff format rewrites parenthesized
# `except (A, B):` to PEP 758 `except A, B:` — a SyntaxError before 3.14.
target-version = "py312"
line-length = 120
extend-exclude = ["alembic/versions", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "W", "B"]
ignore = [
    "B008",  # function call in default arg — this is the standard FastAPI Depends() pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B017"]  # tests intentionally assert against broad Exception

[tool.mypy]
# Starts lenient so it passes on the current tree; tighten incrementally
# (e.g. enable disallow_untyped_defs per-module) as annotations are filled in.
python_version = "3.14"
ignore_missing_imports = true   # third-party libs without stubs
check_untyped_defs = true       # still type-check bodies of untyped funcs
warn_redundant_casts = true
warn_unused_ignores = true
exclude = ["alembic/versions", ".venv"]
