name: FastAPI CI - build and run tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build_with_docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Build backend Docker image
      run: docker build -f Dockerfile.backend -t fa-backend .
    - name: Build frontend Docker image
      run: docker build -f Dockerfile.frontend --target prod -t fa-frontend .

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    # Install the full deps (not just ruff+mypy) so mypy type-checks against
    # real library types. Without them, ignore_missing_imports makes every
    # third-party symbol Any — mypy then misses real errors and even flip-flops
    # on warn_redundant_casts (a cast looks redundant only because the type is Any).
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Ruff lint
      run: ruff check .
    - name: Ruff format check
      run: ruff format --check .
    - name: Mypy type check
      run: mypy app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v6
      with:
        version: 11
    - uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: ESLint
      run: pnpm lint
    - name: Typecheck
      run: pnpm typecheck
    - name: Unit tests
      run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v6
      with:
        version: 11
    - uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    # Phase 1: route-interception E2E — the built frontend with every /api call
    # faked in the browser. No backend, Postgres, or Ollama. The playwright
    # config's webServer runs `pnpm build && pnpm preview`.
    - name: Install Playwright browser
      run: pnpm exec playwright install --with-deps chromium
    - name: Playwright smoke suite
      run: pnpm e2e
    - name: Upload report on failure
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Create .env file
      run: cp .env.sample .env
    # - name: Run Tests
    #   run: |
    #     pytest -v
    - name: Run tests with output to XML file
      run: pytest --junit-xml=test-results.xml

    - name: Surface failing tests
      if: always()
      uses: pmeier/pytest-results-action@main
      with:
        # A list of JUnit XML files, directories containing the former, and wildcard
        # patterns to process.
        # See @actions/glob for supported patterns.
        path: test-results.xml

        # (Optional) Add a summary of the results at the top of the report
        summary: true

        # (Optional) Select which results should be included in the report.
        # Follows the same syntax as `pytest -r`
        # display-options: fEX

        # (Optional) Fail the workflow if no JUnit XML was found.
        fail-on-empty: true

        # (Optional) Title of the test results section in the workflow summary
        title: Test results
